<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fauma Backoffice — Demo Navegable</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f1117;
    color: #fff;
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 240px;
    background: #1a1d27;
    border-right: 1px solid #2a2d37;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 20px 16px;
    border-bottom: 1px solid #2a2d37;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #005258, #1A6B72);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: #fff;
  }

  .sidebar-brand { font-size: 15px; font-weight: 700; color: #fff; }
  .sidebar-brand span { font-size: 10px; font-weight: 400; color: #666; display: block; }

  .nav-section {
    padding: 12px 0;
    border-bottom: 1px solid #2a2d37;
  }

  .nav-section-title {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: #555; padding: 4px 16px 8px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 9px 16px; border: none;
    background: transparent; color: #999; font-size: 13px;
    cursor: pointer; text-align: left; transition: all 0.15s;
    border-left: 3px solid transparent;
  }

  .nav-item:hover { background: #222530; color: #ccc; }
  .nav-item.active {
    background: #1A6B72; color: #fff; font-weight: 600;
    border-left-color: #F4847A;
  }

  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer {
    margin-top: auto; padding: 16px;
    border-top: 1px solid #2a2d37;
    font-size: 10px; color: #444;
  }

  /* --- Main --- */
  .main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: #14161e;
    border-bottom: 1px solid #2a2d37; flex-shrink: 0;
  }

  .topbar-title { font-size: 16px; font-weight: 700; color: #fff; }
  .topbar-subtitle { font-size: 11px; color: #666; margin-top: 2px; }

  .topbar-nav {
    display: flex; gap: 8px; align-items: center;
  }

  .topbar-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1px solid #2a2d37; background: #1a1d27;
    color: #888; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .topbar-btn:hover { background: #1A6B72; border-color: #1A6B72; color: #fff; }
  .topbar-btn:disabled { opacity: 0.3; cursor: default; background: #1a1d27; border-color: #2a2d37; }

  .topbar-counter {
    font-size: 12px; color: #666; padding: 0 8px;
  }

  /* Content frame */
  .content {
    flex: 1; overflow: hidden; position: relative;
  }

  .content iframe {
    width: 100%; height: 100%; border: none;
    background: #fff;
  }

  /* Transition */
  .content-overlay {
    position: absolute; inset: 0; background: #0f1117;
    opacity: 0; pointer-events: none; transition: opacity 0.12s; z-index: 5;
  }
  .transitioning .content-overlay { opacity: 1; }

  /* --- Mobile hamburger --- */
  .mobile-toggle {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid #2a2d37; background: #1a1d27;
    color: #fff; font-size: 20px; cursor: pointer;
    align-items: center; justify-content: center;
  }

  .sidebar-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s;
  }
  .sidebar-overlay.open { opacity: 1; }

  @media (max-width: 900px) {
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 150;
      transform: translateX(-100%); transition: transform 0.3s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .mobile-toggle { display: flex; }
    .topbar { padding-left: 60px; }
  }

  /* Keyboard hint */
  .kbd-hint {
    position: fixed; bottom: 12px; right: 12px;
    font-size: 10px; color: #333;
  }
  .kbd-hint kbd {
    background: #1a1d27; padding: 2px 6px; border-radius: 4px;
    border: 1px solid #2a2d37; font-size: 10px;
  }
  @media (max-width: 900px) { .kbd-hint { display: none; } }
</style>
</head>
<body>

<button class="mobile-toggle" id="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">F</div>
    <div class="sidebar-brand">
      Fauma
      <span>Backoffice</span>
    </div>
  </div>

  <div id="nav-list"></div>

  <div class="sidebar-footer">
    Prototipo navegable &middot; 13 pantallas
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-subtitle" id="topbar-subtitle">Vista general de KPIs y metricas</div>
    </div>
    <div class="topbar-nav">
      <button class="topbar-btn" id="btn-prev" onclick="navigate(-1)">&larr;</button>
      <span class="topbar-counter" id="counter">1 / 13</span>
      <button class="topbar-btn" id="btn-next" onclick="navigate(1)">&rarr;</button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="content-overlay"></div>
    <iframe id="screen-frame" src="screens/01-dashboard.html"></iframe>
  </div>
</div>

<div class="kbd-hint">
  <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Navegar
</div>

<script>
const screens = [
  { file: '01-dashboard.html',     title: 'Dashboard',                 subtitle: 'KPIs, ingresos, suscripciones activas',    icon: '&#9632;',  section: 'General' },
  { file: '02-usuarios.html',      title: 'Usuarios',                  subtitle: 'CRUD usuarios, niveles, historial',        icon: '&#9787;',  section: 'General' },
  { file: '03-pagos.html',         title: 'Pagos y Transacciones',     subtitle: 'Listado, filtros, reembolsos, export',     icon: '&#9733;',  section: 'General' },
  { file: '04-suscripciones.html', title: 'Suscripciones',             subtitle: 'Planes activos, renovaciones, cancelaciones', icon: '&#8634;', section: 'General' },
  { file: '05-animales.html',      title: 'Animales y Especies',       subtitle: 'Alta, editar, archivar, instituciones',    icon: '&#9752;',  section: 'Catalogo' },
  { file: '06-alta-especie.html',  title: 'Alta de Especie',           subtitle: 'Formulario completo de nueva especie',     icon: '&#10010;', section: 'Catalogo' },
  { file: '07-proyectos.html',     title: 'Proyectos y Campanas',      subtitle: 'Fases, duracion, estado, contenido drip',  icon: '&#9881;',  section: 'Catalogo' },
  { file: '08-alta-proyecto.html', title: 'Alta de Proyecto',           subtitle: 'Formulario completo de nuevo proyecto',    icon: '&#10010;', section: 'Catalogo' },
  { file: '09-cms.html',           title: 'Contenido CMS',             subtitle: 'Fotos, videos, programar publicacion',     icon: '&#9998;',  section: 'Contenido' },
  { file: '10-merchandising.html', title: 'Merchandising',             subtitle: 'Catalogo productos, stock, niveles',       icon: '&#9733;',  section: 'Contenido' },
  { file: '11-logistica.html',     title: 'Logistica y Envios',        subtitle: 'Pedidos, estados, tracking',               icon: '&#9993;',  section: 'Operaciones' },
  { file: '12-instituciones.html', title: 'Instituciones',              subtitle: 'Partners, logos, informacion',             icon: '&#9962;',  section: 'Operaciones' },
  { file: '13-regalos.html',       title: 'Regalos',                   subtitle: 'Codigos, canje, reenvio',                  icon: '&#9829;',  section: 'Operaciones' },
];

let currentIndex = 0;

function buildNav() {
  const list = document.getElementById('nav-list');
  let currentSection = '';
  screens.forEach((s, i) => {
    if (s.section !== currentSection) {
      currentSection = s.section;
      const sec = document.createElement('div');
      sec.className = 'nav-section';
      sec.innerHTML = `<div class="nav-section-title">${currentSection}</div>`;
      list.appendChild(sec);
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.dataset.index = i;
    btn.innerHTML = `<span class="nav-icon">${s.icon}</span>${s.title}`;
    btn.onclick = () => { goTo(i); closeSidebar(); };
    list.lastChild.appendChild(btn);
  });
}

function updateUI() {
  const s = screens[currentIndex];
  document.getElementById('topbar-title').textContent = s.title;
  document.getElementById('topbar-subtitle').textContent = s.subtitle;
  document.getElementById('counter').textContent = `${currentIndex + 1} / ${screens.length}`;
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === screens.length - 1;

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.index) === currentIndex);
  });
  const active = document.querySelector('.nav-item.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function goTo(index) {
  if (index < 0 || index >= screens.length || index === currentIndex) return;
  const content = document.getElementById('content');
  content.classList.add('transitioning');
  setTimeout(() => {
    currentIndex = index;
    document.getElementById('screen-frame').src = 'screens/' + screens[index].file;
    updateUI();
    setTimeout(() => content.classList.remove('transitioning'), 80);
  }, 120);
}

function navigate(delta) { goTo(currentIndex + delta); }

// Mobile sidebar
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  const overlay = document.getElementById('sidebar-overlay');
  overlay.style.display = 'block';
  requestAnimationFrame(() => overlay.classList.toggle('open'));
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  const overlay = document.getElementById('sidebar-overlay');
  overlay.classList.remove('open');
  setTimeout(() => { overlay.style.display = 'none'; }, 300);
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === 'ArrowRight') navigate(1);
});

buildNav();
updateUI();
</script>
</body>
</html>
